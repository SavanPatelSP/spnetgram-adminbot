name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: spnetgram_test
          POSTGRES_USER: spnetgram
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - run: npx prisma generate

      - run: npx prisma db push
        env:
          DATABASE_URL: postgresql://spnetgram:testpass@localhost:5432/spnetgram_test

      - run: npm run build

      - run: npm test
        env:
          DATABASE_URL: postgresql://spnetgram:testpass@localhost:5432/spnetgram_test
          REDIS_URL: redis://localhost:6379
          BOT_TOKEN: test
          JWT_SECRET: test-secret
          JWT_EXPIRES_IN: 15m

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint
